flutter_icons:
  android: true
  ios: true
  image_path: "assets/icons/bccashier.png"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/icons/bccashier.png"
  remove_alpha_ios: true
  remove_alpha_android: true


flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/audios/
    - assets/audios/transaction/
    - assets/audios/order/
    - assets/audios/payment/
    - assets/audios/system/
    - assets/audios/display/
    - assets/audios/numpad/
    - assets/images/
    - assets/icons/
    - assets/flags/
    - assets/fonts/

  fonts:
    - family: nato
      fonts:
        - asset: assets/fonts/nato/NotoSansThai.ttf

