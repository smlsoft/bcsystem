services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bccashierauditlog-service
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      PORT: 8088
    ports:
      - "8088:8088"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  postgres:
    image: postgres:16
    container_name: bccashierauditlog-postgres
    environment:
      POSTGRES_DB: bccashier_audit_log
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - bccashierauditlog_pgdata:/var/lib/postgresql/data
    profiles:
      - local-db

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: bccashierauditlog-cloudflared
    command: tunnel --no-autoupdate run --token ${CLOUDFLARED_TOKEN}
    depends_on:
      - app
    profiles:
      - tunnel

volumes:
  bccashierauditlog_pgdata:
