version: "3"
services:
  mainsvc:
    image: "smlcloudplatform"
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8089:8089"
    environment:
      - SERVICE_PORT=8089
      - MONGODB_URI=${MONGODB_URI}
      - MONGODB_DB=smldevdb
      - MONGODB_DEBUG=true
      - REDIS_CACHE_URI=redisx:6379
      - KAFKA_SERVER_URL=kafka:9093
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=5533
      - POSTGRES_DB_NAME=dedeposdev
      - POSTGRES_USERNAME=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_SSL_MODE=disable
      - POSTGRES_LOGGER_LEVEL=debug

    volumes:
      - ${PROJECT_DIR:-.}/cmd/app/ca-certificate.crt:/root/ca-certificate.crt:ro
    networks:
      - "cloud"
networks:
  cloud:
    name: sml_cloud_network
    external: true
